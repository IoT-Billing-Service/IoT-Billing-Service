name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC

jobs:
  stale:
    name: Mark stale items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this is still relevant, please add a comment to keep it open.
          stale-issue-label: 'stale'
          days-before-issue-stale: 60
          days-before-issue-close: 14

          # Pull Requests
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further activity occurs.
            If this is still a work in progress, please add a comment to keep it open.
          stale-pr-label: 'stale'
          days-before-pr-stale: 30
          days-before-pr-close: 14

          # Exempt labels
          exempt-issue-labels: 'pinned,security,enhancement,bug'
          exempt-pr-labels: 'pinned,security,dependencies'
          exempt-all-milestones: true
