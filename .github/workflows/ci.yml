name: Monorepo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────
  #  Root-level checks
  # ─────────────────────────────────────────────────────────
  root-checks:
    name: Root Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for merge conflicts
        run: |
          ! grep -rn '<<<<<<< ' --include='*.ts' --include='*.tsx' --include='*.rs' --include='*.json' --include='*.yml' --include='*.yaml' --include='*.toml' --include='*.md' . 2>/dev/null
      - name: Validate file permissions
        run: |
          bad=$(find . -name '*.sh' -not -executable 2>/dev/null | head -5)
          if [ -n "$bad" ]; then echo "Scripts must be executable:"; echo "$bad"; exit 1; fi
      - name: Check for .env files committed
        run: |
          found=$(find . -name '.env' -not -path './.env.example' -not -path '*/node_modules/*' -not -path '*/.next/*' 2>/dev/null | head -5)
          if [ -n "$found" ]; then echo "Committed .env files found:"; echo "$found"; exit 1; fi

  # ─────────────────────────────────────────────────────────
  #  Backend CI
  # ─────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run format
      - run: npm run lint

  backend-typecheck:
    name: Backend TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iot_billing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iot_billing
      - run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iot_billing
      - run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iot_billing
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          SOROBAN_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long-for-ci
          REDIS_URL: redis://localhost:6379
          TIMESCALEDB_URL: postgresql://postgres:postgres@localhost:5432/iot_billing

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ─────────────────────────────────────────────────────────
  #  Frontend CI
  # ─────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  frontend-typecheck:
    name: Frontend TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run --reporter=verbose

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-typecheck]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  frontend-bundle-size:
    name: Frontend Bundle Analysis
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check initial route bundle size (< 200 KB gzipped)
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const zlib = require('zlib');
          const manifestPath = '.next/build-manifest.json';
          if (!fs.existsSync(manifestPath)) {
            console.log('build-manifest.json not found — skipping size check');
            process.exit(0);
          }
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          let rootChunks = manifest.pages?.['/'] ?? manifest.pages?.['index'] ?? [];
          if (rootChunks.length === 0) {
            rootChunks = [
              ...(manifest.rootMainFiles ?? []),
              ...(manifest.polyfillFiles ?? []),
            ];
          }
          if (rootChunks.length === 0) {
            console.log('No chunks found — skipping check');
            process.exit(0);
          }
          let totalGzip = 0;
          for (const chunk of rootChunks) {
            const filePath = path.join('.next', chunk);
            if (!fs.existsSync(filePath)) continue;
            const raw = fs.readFileSync(filePath);
            const compressed = zlib.gzipSync(raw);
            totalGzip += compressed.length;
          }
          const totalKB = (totalGzip / 1024).toFixed(1);
          const limitKB = 200;
          console.log(`Initial / route total gzipped JS: ${totalKB} KB (limit: ${limitKB} KB)`);
          if (totalGzip > limitKB * 1024) {
            console.error(`FAIL: Initial bundle ${totalKB} KB exceeds the ${limitKB} KB gzip threshold.`);
            process.exit(1);
          }
          console.log(`PASS: Initial bundle is within the ${limitKB} KB gzip threshold.`);
          EOF

  # ─────────────────────────────────────────────────────────
  #  Smart Contracts CI
  # ─────────────────────────────────────────────────────────
  contracts-lint:
    name: Contracts Lint (clippy + fmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  contracts-tests:
    name: Contracts Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Run tests
        run: cargo test

  contracts-build-wasm:
    name: Contracts WASM Build
    runs-on: ubuntu-latest
    needs: [contracts-lint, contracts-tests]
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Build WASM artifacts
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm

  # ─────────────────────────────────────────────────────────
  #  Docker Build Check
  # ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t iot-billing-backend -f backend/Dockerfile backend/
      - name: Build frontend Docker image
        run: docker build -t iot-billing-frontend -f frontend/Dockerfile.frontend frontend/

  # ─────────────────────────────────────────────────────────
  #  Dependency Audit
  # ─────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high || true
      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true
