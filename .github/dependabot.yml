version: 2
updates:
  # ─────────────────────────────────────────────────────────
  #  Backend (npm)
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Africa/Lagos'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'fix(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      stellar:
        patterns:
          - '@stellar/*'
        update-types:
          - 'minor'
          - 'patch'
      fastify:
        patterns:
          - 'fastify*'
          - '@fastify/*'
        update-types:
          - 'minor'
          - 'patch'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
        update-types:
          - 'minor'
          - 'patch'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'typescript'
          - 'eslint'
        update-types:
          - 'minor'
          - 'patch'
      testing:
        patterns:
          - 'vitest*'
          - '@vitest/*'
          - '@testing-library/*'
        update-types:
          - 'minor'
          - 'patch'

  # ─────────────────────────────────────────────────────────
  #  Frontend (npm)
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Africa/Lagos'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'fix(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
          - '@next/*'
        update-types:
          - 'minor'
          - 'patch'
      stellar:
        patterns:
          - '@stellar/*'
        update-types:
          - 'minor'
          - 'patch'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
        update-types:
          - 'minor'
          - 'patch'
      testing:
        patterns:
          - 'vitest*'
          - '@vitest/*'
          - '@testing-library/*'
          - '@playwright/*'
        update-types:
          - 'minor'
          - 'patch'

  # ─────────────────────────────────────────────────────────
  #  Contracts (Cargo)
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: 'cargo'
    directory: '/contracts'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Africa/Lagos'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'contracts'
    commit-message:
      prefix: 'fix(deps)'

  # ─────────────────────────────────────────────────────────
  #  GitHub Actions (self)
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Africa/Lagos'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(ci)'
