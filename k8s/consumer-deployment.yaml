apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-consumer
  namespace: billing
  labels:
    app: billing-consumer
    component: event-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-consumer
  template:
    metadata:
      labels:
        app: billing-consumer
        component: event-consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: billing-consumer
      containers:
        - name: consumer
          image: iot-billing/backend:latest
          command: ["node", "dist/stream/consumer_worker.js"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: redis-url
            - name: TIMESCALEDB_URL
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: timescaledb-url
            - name: CONSUMER_LAG_POLL_INTERVAL_MS
              value: "10000"
            - name: CONSUMER_LAG_WARN_ENTRIES
              value: "1000"
            - name: CONSUMER_LAG_CRITICAL_ENTRIES
              value: "10000"
          ports:
            - containerPort: 3000
              name: metrics
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
