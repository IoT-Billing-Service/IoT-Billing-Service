apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: billing-consumer-hpa
  namespace: billing
  labels:
    app: billing-consumer
    component: event-consumer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: billing-consumer
  minReplicas: 2
  maxReplicas: 20
  metrics:
    # Scale based on per-pod pending entries average from Prometheus.
    # Each consumer pod exposes its metrics via the /metrics endpoint.
    - type: Pods
      pods:
        metric:
          name: stream_consumer_group_pending_entries
        target:
          type: AverageValue
          averageValue: "500"
    # CPU-based scaling as a fallback.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
