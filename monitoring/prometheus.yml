global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'iot-billing-contracts'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'hardhat-node'
    static_configs:
      - targets: ['localhost:8545']

rule_files:
  - 'billing_alerts.yml'