services:
  - type: web
    name: iot-billing-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SKIP_MIGRATION_ON_STARTUP
        value: 'true'
      - key: OTEL_SERVICE_NAME
        value: iot-billing-backend
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: TIMESCALEDB_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SOROBAN_RPC_URL
        sync: false
      - key: SOROBAN_NETWORK_PASSPHRASE
        sync: false
      - key: CONTRACT_ID
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      # Required for fail-closed production billing. Set this to a JSON map of
      # release key ids to PEM-encoded Ed25519 public keys in Render.
      - key: RUNTIME_CONFIG_AUTHORIZED_KEYS
        sync: false
      - key: RUNTIME_CONFIG_AUDIT_SCAN_INTERVAL_MS
        value: '1000'
